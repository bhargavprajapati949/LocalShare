name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  prepare:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      sha: ${{ steps.git_sha.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump_type }} --no-git-tag-version)
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Upload bumped package.json
        uses: actions/upload-artifact@v4
        with:
          name: bumped-package
          path: package.json

      - name: Get current Git SHA
        id: git_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build for ${{ matrix.os }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download bumped package.json
        uses: actions/download-artifact@v4
        with:
          name: bumped-package
          path: .

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron-builder
            ~/Library/Caches/electron-builder
            C:\Users\runneradmin\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-builder-

      - name: Build Electron App
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npm run electron:build -- --win
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npm run electron:build -- --mac
          else
            npm run electron:build -- --linux
          fi
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.zip

  publish:
    name: Create GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true 

      - name: Commit and Push version bump
        id: push_step
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Get the bumped package.json from artifacts
          # It's in release/package.json because of merge-multiple
          mv release/package.json .
          git add package.json
          git commit -m "chore: bump version to ${{ needs.prepare.outputs.tag }}"
          git push
          echo "new_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ steps.push_step.outputs.new_sha }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
            release/*.tar.gz
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
