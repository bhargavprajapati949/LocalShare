name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history + push access (uses GITHUB_TOKEN by default)
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bump patch version
        id: version
        run: |
          # Bump patch in package.json without creating a git tag
          NEW_VERSION=$(npm version patch --no-git-tag-version)
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to ${NEW_VERSION}"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.tag }} [skip ci]"
          git push

      - name: Build all platform packages
        run: npm run package:all

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          generate_release_notes: true
          files: |
            release/localshare-linux-x64
            release/localshare-macos-arm64
            release/localshare-macos-x64-intel
            release/localshare-win-x64.exe
